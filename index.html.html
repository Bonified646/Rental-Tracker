<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rentals">
<title>Rental Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #1a1e2a;
    --border: #252836;
    --text: #e8e3d8;
    --muted: #6b7585;
    --gold: #c9a96e;
    --gold-dim: rgba(201,169,110,0.12);
    --gold-border: rgba(201,169,110,0.25);
    --green: #52a878;
    --green-dim: rgba(82,168,120,0.12);
    --green-border: rgba(82,168,120,0.3);
    --red: #d96b6b;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 52px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .header-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  /* TABS */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 0;
    padding-bottom: calc(80px + var(--safe-bottom));
  }

  /* NAV */
  .nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 20;
  }
  .nav-btn {
    flex: 1;
    padding: 12px 0 10px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; }

  /* FORM ELEMENTS */
  .field-label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'DM Sans', sans-serif;
  }
  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px 14px;
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 16px;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--gold); }

  .type-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .type-btn {
    flex: 1;
    padding: 11px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .type-btn.income.active {
    border-color: var(--green);
    background: var(--green-dim);
    color: var(--green);
  }
  .type-btn.expense.active {
    border-color: var(--gold);
    background: var(--gold-dim);
    color: var(--gold);
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--gold);
    border: none;
    border-radius: 8px;
    color: #0c0e14;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s, transform 0.1s;
    margin-top: 4px;
  }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn.saved { background: var(--green); }

  .shared-hint {
    font-size: 11px;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  /* ENTRY CARDS */
  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .entry-body { flex: 1; min-width: 0; }
  .entry-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 4px;
    padding: 2px 8px;
    border: 1px solid;
  }
  .badge.income { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }
  .badge.expense { color: var(--gold); border-color: var(--gold-border); background: var(--gold-dim); }
  .entry-prop { font-size: 11px; color: var(--muted); }
  .entry-amount {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 3px;
  }
  .entry-amount.income { color: var(--green); }
  .entry-amount.expense { color: var(--text); }
  .entry-detail { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .entry-split { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; }

  .more-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    flex-shrink: 0;
    line-height: 1;
  }
  .confirm-delete {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .confirm-btn {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
  }
  .confirm-btn.danger { border-color: var(--red); color: var(--red); }
  .confirm-btn.cancel { border-color: var(--border); color: var(--muted); }

  /* FILTERS */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .chip.active {
    border-color: var(--gold);
    background: var(--gold-dim);
    color: var(--gold);
  }

  .year-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--gold);
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    margin-left: auto;
    flex-shrink: 0;
  }

  /* SUMMARY */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .summary-prop-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--gold);
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid var(--surface2);
    color: #9aa3b0;
    gap: 8px;
  }
  .summary-row .sche { font-size: 10px; color: var(--muted); margin-left: 4px; }
  .summary-income-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid var(--surface2);
    color: var(--green);
    font-weight: 500;
  }
  .summary-total-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid var(--surface2);
    color: var(--muted);
  }
  .summary-net {
    display: flex;
    justify-content: space-between;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    padding: 12px 0 0;
    margin-top: 4px;
  }
  .net-positive { color: var(--green); }
  .net-negative { color: var(--red); }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 50px 0;
    font-size: 14px;
    line-height: 1.8;
  }

  .footer-note {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 0 0 16px;
    line-height: 1.7;
    letter-spacing: 0.02em;
  }

  .export-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--gold-border);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .export-btn:active { transform: scale(0.98); background: var(--gold-dim); }
  .export-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

  .section-row {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-eyebrow">Rental Property Tracker</div>
    <div class="header-title">Income &amp; Expenses</div>
  </div>

  <div class="content" id="content"></div>

  <nav class="nav">
    <button class="nav-btn active" data-tab="log" onclick="switchTab('log')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Log
    </button>
    <button class="nav-btn" data-tab="history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      History
    </button>
    <button class="nav-btn" data-tab="summary" onclick="switchTab('summary')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Summary
    </button>
  </nav>
</div>

<script>
const PROPERTIES = [
  { id: 'duplex', label: 'Duplex Unit 2', sublabel: 'Tiny house rental' },
  { id: 'sfr', label: 'Single-Family Rental', sublabel: 'Separate lot' },
  { id: 'shared', label: 'Duplex Shared', sublabel: 'Split 50/50 w/ your unit' },
];

const CATEGORIES = [
  { id: 'mortgage_interest', label: 'Mortgage Interest', line: 'Line 12' },
  { id: 'taxes', label: 'Property Taxes', line: 'Line 16' },
  { id: 'insurance', label: 'Insurance', line: 'Line 9' },
  { id: 'repairs', label: 'Repairs & Maintenance', line: 'Line 14' },
  { id: 'utilities', label: 'Utilities', line: 'Line 17' },
  { id: 'management', label: 'Management Fees', line: 'Line 10' },
  { id: 'advertising', label: 'Advertising', line: 'Line 5' },
  { id: 'supplies', label: 'Supplies', line: 'Line 19' },
  { id: 'legal_prof', label: 'Legal & Professional', line: 'Line 10' },
  { id: 'auto_travel', label: 'Auto & Travel', line: 'Line 6' },
  { id: 'depreciation', label: 'Depreciation', line: 'Line 20' },
  { id: 'other', label: 'Other Expense', line: 'Line 19' },
];

let state = {
  tab: 'log',
  form: {
    type: 'expense',
    property: 'duplex',
    category: 'repairs',
    amount: '',
    date: todayISO(),
    note: '',
  },
  saved: false,
  deleteId: null,
  filterProp: 'all',
  filterType: 'all',
  filterYear: new Date().getFullYear().toString(),
  summaryYear: new Date().getFullYear().toString(),
};

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function loadEntries() {
  try {
    return JSON.parse(localStorage.getItem('rental_entries') || '[]');
  } catch { return []; }
}

function saveEntries(entries) {
  localStorage.setItem('rental_entries', JSON.stringify(entries));
}

function fmtCurrency(n) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n || 0);
}

function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${m}/${d}/${y}`;
}

function getPropLabel(id) {
  return PROPERTIES.find(p => p.id === id)?.label || id;
}

function getCatLabel(id) {
  return CATEGORIES.find(c => c.id === id)?.label || id;
}

function getYears(entries) {
  const ys = [...new Set(entries.map(e => e.date?.slice(0, 4)).filter(Boolean))].sort().reverse();
  return ys.length ? ys : [new Date().getFullYear().toString()];
}

// ---- RENDER ----

function render() {
  const content = document.getElementById('content');
  if (state.tab === 'log') content.innerHTML = renderLog();
  else if (state.tab === 'history') content.innerHTML = renderHistory();
  else content.innerHTML = renderSummary();

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.tab);
  });
}

function renderLog() {
  const f = state.form;
  return `
    <label class="field-label">Entry type</label>
    <div class="type-toggle">
      <button class="type-btn expense ${f.type === 'expense' ? 'active' : ''}" onclick="setType('expense')">− Expense</button>
      <button class="type-btn income ${f.type === 'income' ? 'active' : ''}" onclick="setType('income')">+ Income</button>
    </div>

    <label class="field-label">Property</label>
    <select onchange="setField('property', this.value)">
      ${PROPERTIES.map(p => `<option value="${p.id}" ${f.property === p.id ? 'selected' : ''}>${p.label} — ${p.sublabel}</option>`).join('')}
    </select>

    ${f.type === 'expense' ? `
      <label class="field-label">Category (Schedule E)</label>
      <select onchange="setField('category', this.value)">
        ${CATEGORIES.map(c => `<option value="${c.id}" ${f.category === c.id ? 'selected' : ''}>${c.label} (${c.line})</option>`).join('')}
      </select>
    ` : ''}

    <label class="field-label">Amount ($)</label>
    <input type="number" inputmode="decimal" placeholder="0.00" value="${f.amount}" oninput="setField('amount', this.value)">

    <label class="field-label">Date</label>
    <input type="date" value="${f.date}" onchange="setField('date', this.value)">

    <label class="field-label">Note (optional)</label>
    <input type="text" placeholder="e.g. plumber visit, June rent" value="${f.note}" oninput="setField('note', this.value)">

    ${f.property === 'shared' ? `<div class="shared-hint">Shared duplex expenses are split 50/50 between your unit and Unit 2 automatically.</div>` : ''}

    <button class="submit-btn ${state.saved ? 'saved' : ''}" onclick="submitEntry()">
      ${state.saved ? '✓ Saved!' : `Save ${f.type === 'income' ? 'Income' : 'Expense'}`}
    </button>
  `;
}

function renderHistory() {
  const entries = loadEntries();
  const years = getYears(entries);

  const filtered = entries.filter(e => {
    if (state.filterProp !== 'all' && e.property !== state.filterProp) return false;
    if (state.filterType !== 'all' && e.type !== state.filterType) return false;
    if (state.filterYear && !e.date?.startsWith(state.filterYear)) return false;
    return true;
  });

  const yearOptions = years.map(y => `<option value="${y}" ${state.filterYear === y ? 'selected' : ''}>${y}</option>`).join('');

  const cards = filtered.length === 0
    ? `<div class="empty-state">No entries yet.<br>Log your first entry in the Log tab.</div>`
    : filtered.map(e => {
        const isShared = e.property === 'shared';
        return `
          <div class="entry-card">
            <div class="entry-body">
              <div class="entry-meta">
                <span class="badge ${e.type}">${e.type}</span>
                <span class="entry-prop">${getPropLabel(e.property)}</span>
              </div>
              <div class="entry-amount ${e.type}">${e.type === 'income' ? '+' : '-'}${fmtCurrency(e.amount)}</div>
              <div class="entry-detail">
                ${e.type === 'expense' ? getCatLabel(e.category) + ' · ' : ''}${fmtDate(e.date)}${e.note ? ' · ' + e.note : ''}
              </div>
              ${isShared ? `<div class="entry-split">50% allocated = ${fmtCurrency(e.amount * 0.5)}</div>` : ''}
              ${state.deleteId === e.id ? `
                <div class="confirm-delete">
                  <button class="confirm-btn danger" onclick="confirmDelete('${e.id}')">Delete</button>
                  <button class="confirm-btn cancel" onclick="cancelDelete()">Cancel</button>
                </div>
              ` : ''}
            </div>
            <button class="more-btn" onclick="toggleDelete('${e.id}')">···</button>
          </div>
        `;
      }).join('');

  return `
    <div class="section-row">
      <span class="section-label">Filter</span>
      <select class="year-select" onchange="setHistoryYear(this.value)">
        <option value="">All years</option>
        ${yearOptions}
      </select>
    </div>
    <div class="filter-row">
      ${['all','expense','income'].map(t => `<button class="chip ${state.filterType === t ? 'active' : ''}" onclick="setFilterType('${t}')">${t === 'all' ? 'All types' : t === 'income' ? 'Income' : 'Expenses'}</button>`).join('')}
    </div>
    <div class="filter-row">
      <button class="chip ${state.filterProp === 'all' ? 'active' : ''}" onclick="setFilterProp('all')">All properties</button>
      ${PROPERTIES.map(p => `<button class="chip ${state.filterProp === p.id ? 'active' : ''}" onclick="setFilterProp('${p.id}')">${p.label}</button>`).join('')}
    </div>
    ${cards}
  `;
}

function renderSummary() {
  const entries = loadEntries();
  const years = getYears(entries);
  const yr = state.summaryYear;

  const relevant = entries.filter(e => e.date?.startsWith(yr));

  // Build totals
  const totals = {};
  PROPERTIES.forEach(p => {
    totals[p.id] = { income: 0, expenses: {}, total_expense: 0 };
    CATEGORIES.forEach(c => { totals[p.id].expenses[c.id] = 0; });
  });

  relevant.forEach(e => {
    const split = e.property === 'shared' ? 0.5 : 1;
    const target = e.property === 'shared' ? 'duplex' : e.property;
    if (e.type === 'income') {
      totals[target].income += e.amount * split;
    } else {
      totals[target].expenses[e.category] += e.amount * split;
      totals[target].total_expense += e.amount * split;
    }
  });

  const yearOptions = years.map(y => `<option value="${y}" ${yr === y ? 'selected' : ''}>${y}</option>`).join('');

  const cards = [
    { id: 'duplex', label: 'Duplex Unit 2 — Tiny House' },
    { id: 'sfr', label: 'Single-Family Rental' },
  ].map(prop => {
    const d = totals[prop.id];
    const net = d.income - d.total_expense;
    const activeCats = CATEGORIES.filter(c => d.expenses[c.id] > 0);
    return `
      <div class="summary-card">
        <div class="summary-prop-title">${prop.label}</div>
        <div class="summary-income-row">
          <span>Total Income</span><span>${fmtCurrency(d.income)}</span>
        </div>
        ${activeCats.map(c => `
          <div class="summary-row">
            <span>${c.label}<span class="sche">${c.line}</span></span>
            <span>${fmtCurrency(d.expenses[c.id])}</span>
          </div>
        `).join('')}
        <div class="summary-total-row">
          <span>Total Expenses</span><span>${fmtCurrency(d.total_expense)}</span>
        </div>
        <div class="summary-net">
          <span>Net ${net >= 0 ? 'Income' : 'Loss'}</span>
          <span class="${net >= 0 ? 'net-positive' : 'net-negative'}">${fmtCurrency(Math.abs(net))}</span>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="section-row">
      <span class="section-label">Tax Year Summary</span>
      <select class="year-select" onchange="setSummaryYear(this.value)">
        ${yearOptions}
      </select>
    </div>
    ${cards}
    <button class="export-btn" onclick="exportCSV('${yr}')">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export ${yr} to CSV (Numbers)
    </button>
    <button class="export-btn" onclick="exportCSV('all')" style="margin-bottom:20px;">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export All Years to CSV
    </button>
    <div class="footer-note">
      Shared duplex expenses split 50% to Unit 2.<br>
      Depreciation requires your tax preparer's input.<br>
      Not tax advice — consult a CPA for your situation.
    </div>
  `;
}

// ---- ACTIONS ----

function switchTab(tab) {
  state.tab = tab;
  render();
}

function setType(type) {
  state.form.type = type;
  render();
}

function setField(field, val) {
  state.form[field] = val;
  // Re-render only for property change (shows/hides shared hint)
  if (field === 'property') render();
}

function submitEntry() {
  const f = state.form;
  const amount = parseFloat(f.amount);
  if (!f.amount || isNaN(amount) || amount <= 0) return;

  const entries = loadEntries();
  const entry = {
    id: Date.now().toString(),
    type: f.type,
    property: f.property,
    category: f.category,
    amount,
    date: f.date,
    note: f.note,
    createdAt: new Date().toISOString(),
  };
  saveEntries([entry, ...entries]);

  state.saved = true;
  state.form = {
    type: f.type,
    property: f.property,
    category: f.category,
    amount: '',
    date: todayISO(),
    note: '',
  };
  render();
  setTimeout(() => { state.saved = false; render(); }, 1800);
}

function toggleDelete(id) {
  state.deleteId = state.deleteId === id ? null : id;
  render();
}

function confirmDelete(id) {
  const entries = loadEntries().filter(e => e.id !== id);
  saveEntries(entries);
  state.deleteId = null;
  render();
}

function cancelDelete() {
  state.deleteId = null;
  render();
}

function setFilterType(t) { state.filterType = t; render(); }
function setFilterProp(p) { state.filterProp = p; render(); }
function setHistoryYear(y) { state.filterYear = y; render(); }
function setSummaryYear(y) { state.summaryYear = y; render(); }

function exportCSV(yearFilter) {
  const allEntries = loadEntries();
  const entries = yearFilter === 'all'
    ? allEntries
    : allEntries.filter(e => e.date?.startsWith(yearFilter));

  if (entries.length === 0) {
    alert('No entries to export for the selected period.');
    return;
  }

  const headers = [
    'Date',
    'Type',
    'Property',
    'Category (Schedule E)',
    'Amount',
    'Allocated Amount (after 50/50 split)',
    'Note',
  ];

  const rows = entries.map(e => {
    const isShared = e.property === 'shared';
    const allocated = isShared ? (e.amount * 0.5).toFixed(2) : e.amount.toFixed(2);
    const propLabel = getPropLabel(e.property);
    const catLabel = e.type === 'expense' ? getCatLabel(e.category) : 'Rental Income';
    const note = (e.note || '').replace(/"/g, '""');
    return [
      e.date || '',
      e.type,
      propLabel,
      catLabel,
      e.amount.toFixed(2),
      allocated,
      `"${note}"`,
    ].join(',');
  });

  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const filename = yearFilter === 'all'
    ? 'rental-tracker-all-years.csv'
    : `rental-tracker-${yearFilter}.csv`;

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ---- INIT ----
render();
</script>
</body>
</html>
